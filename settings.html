<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — Parax</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand" onclick="window.location.href='/'">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="24" height="24" rx="6" fill="#5865f2" />
        <path d="M7 8.5C7 7.67 7.67 7 8.5 7H11V12H7V8.5ZM13 7H15.5C16.33 7 17 7.67 17 8.5V12H13V7ZM7 12H11V16.5C7.67 16.5 7 15.83 7 15V12ZM13 12H17V15C17 15.83 16.33 16.5 15.5 16.5H13V12Z" fill="white" />
      </svg>
      Parax
    </div>
    <div class="navbar-links" id="nav-links"></div>
  </nav>

  <div class="settings-wrapper">
    <div class="settings-card">
      <h1>Settings</h1>
      <p class="subtitle">Customize your profile</p>

      <div class="settings-section">
        <div class="avatar-section">
          <div class="avatar-preview" id="avatar-preview">
            <img id="avatar-img" src="" alt="Profile photo" style="display:none" />
            <span id="avatar-placeholder" class="avatar-placeholder">?</span>
          </div>
          <div class="avatar-actions">
            <button id="upload-avatar-btn" class="btn btn-secondary">Upload Photo</button>
            <button id="remove-avatar-btn" class="btn btn-secondary" style="display:none">Remove</button>
            <input type="file" id="avatar-input" accept="image/*" style="display:none" />
          </div>
        </div>
      </div>

      <div class="settings-section">
        <div class="form-group">
          <label for="settings-username">Display Name</label>
          <input type="text" id="settings-username" placeholder="Your display name" maxlength="32" />
        </div>

        <div class="form-group">
          <label for="settings-bio">Bio</label>
          <textarea id="settings-bio" placeholder="Tell us about yourself..." maxlength="200" rows="3"></textarea>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="settings-email" disabled />
        </div>
      </div>

      <div class="settings-footer">
        <button id="save-settings-btn" class="btn btn-primary">Save Changes</button>
        <a href="/dashboard.html" class="btn btn-secondary">Back</a>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
