<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — Parax</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="24" height="24" rx="6" fill="#5865f2" />
        <path d="M7 8.5C7 7.67 7.67 7 8.5 7H11V12H7V8.5ZM13 7H15.5C16.33 7 17 7.67 17 8.5V12H13V7ZM7 12H11V16.5C7.67 16.5 7 15.83 7 15V12ZM13 12H17V15C17 15.83 16.33 16.5 15.5 16.5H13V12Z" fill="white" />
      </svg>
      Parax
    </div>
    <div class="navbar-links">
      <a href="signup.html">Sign Up</a>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>Welcome back!</h1>
      <p class="subtitle">We're so excited to see you again!</p>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email <span class="required">*</span></label>
          <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" />
          <div class="error-message"></div>
        </div>

        <div class="form-group">
          <label for="password">Password <span class="required">*</span></label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" />
            <button type="button" class="password-toggle">Show</button>
          </div>
          <div class="error-message"></div>
        </div>

        <div class="form-row">
          <label>
            <input type="checkbox" name="remember" />
            Remember me
          </label>
          <a href="#">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-full">Log In</button>

        <button type="button" id="google-login" class="btn btn-secondary btn-full" style="margin-top: 8px;">
          Sign in with Google
        </button>
      </form>

      <p class="switch-text">
        <a href="signup.html">Need an account?</a>
      </p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
