<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Parax</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand" onclick="window.location.href='/'">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="24" height="24" rx="6" fill="#5865f2" />
        <path d="M7 8.5C7 7.67 7.67 7 8.5 7H11V12H7V8.5ZM13 7H15.5C16.33 7 17 7.67 17 8.5V12H13V7ZM7 12H11V16.5C7.67 16.5 7 15.83 7 15V12ZM13 12H17V15C17 15.83 16.33 16.5 15.5 16.5H13V12Z" fill="white" />
      </svg>
      Parax
    </div>
    <div class="navbar-links" id="nav-links">
    </div>
  </nav>

  <div class="dashboard-wrapper">
    <div class="dashboard-card">
      <h1>Your Rooms</h1>
      <p class="subtitle">Create a new room or join an existing one</p>

      <div class="dashboard-actions">
        <div class="create-room">
          <div class="form-row">
            <label>
              <input type="checkbox" id="enable-room-password" />
              Set a password
            </label>
          </div>
          <div id="room-password-field" class="password-field hidden">
            <div class="password-wrapper">
              <input type="text" id="room-password-input" class="room-password-input" placeholder="Room password" maxlength="50" autocomplete="off" />
            </div>
          </div>
          <button id="create-room-btn" class="btn btn-primary btn-full">Create Room</button>
        </div>
        <div class="divider"><span>or</span></div>
        <div class="join-room">
          <input type="text" id="room-code-input" placeholder="Enter 11-digit room code" maxlength="11" inputmode="numeric" />
          <button id="join-room-btn" class="btn btn-primary btn-full">Join Room</button>
        </div>
      </div>

      <div id="room-list" class="room-list">
        <p class="room-list-empty">No rooms yet. Create or join one!</p>
      </div>
    </div>
  </div>

  <div id="password-modal" class="modal-overlay hidden">
    <div class="modal-card">
      <h2>Room Password Required</h2>
      <p id="password-prompt-info" class="subtitle">This room is protected. Enter the password to continue.</p>
      <div class="password-wrapper">
        <input type="text" id="password-prompt-input" class="room-password-input" placeholder="Enter room password" maxlength="50" autocomplete="off" />
      </div>
      <div class="modal-actions">
        <button id="password-prompt-cancel" class="btn btn-secondary">Cancel</button>
        <button id="password-prompt-confirm" class="btn btn-primary">Join</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
