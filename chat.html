<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room — Parax</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
  <script src="para.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand" onclick="window.location.href='/'">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="24" height="24" rx="6" fill="#5865f2" />
        <path d="M7 8.5C7 7.67 7.67 7 8.5 7H11V12H7V8.5ZM13 7H15.5C16.33 7 17 7.67 17 8.5V12H13V7ZM7 12H11V16.5C7.67 16.5 7 15.83 7 15V12ZM13 12H17V15C17 15.83 16.33 16.5 15.5 16.5H13V12Z" fill="white" />
      </svg>
      Parax
    </div>
    <div class="navbar-links" id="nav-links">
    </div>
  </nav>

  <div class="chat-wrapper">
    <div class="chat-header" id="chat-header">
      <span>Room: <strong id="room-code-display"></strong></span>
      <button id="leave-room-btn" class="btn btn-secondary">Leave</button>
    </div>
    <div class="chat-messages" id="chat-messages">
      <div class="chat-loading">Loading messages...</div>
    </div>
    <div class="chat-input-bar">
      <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" />
      <button id="send-btn" class="btn btn-primary">Send</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
