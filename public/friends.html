<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friends — Parax</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand" onclick="window.location.href='/dashboard.html'">Parax</div>
    <div class="navbar-links">
        <a href="dashboard.html">Back to Dashboard</a>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>Friends</h1>
      <div class="form-group">
        <input type="text" id="friend-username" placeholder="Add friend by username..." />
        <button id="add-friend-btn" class="btn btn-primary btn-full">Send Request</button>
      </div>
      <div id="friend-list"></div>
      <h3>Pending Requests</h3>
      <div id="pending-list"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
