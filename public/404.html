<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — Parax</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body style="display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg-primary); font-family:var(--font);">
  <div style="text-align:center; max-width:420px; padding:40px 24px;">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:72px; height:72px; margin:0 auto 24px;">
      <rect width="24" height="24" rx="6" fill="#5865f2" />
      <path d="M7 8.5C7 7.67 7.67 7 8.5 7H11V12H7V8.5ZM13 7H15.5C16.33 7 17 7.67 17 8.5V12H13V7ZM7 12H11V16.5C7.67 16.5 7 15.83 7 15V12ZM13 12H17V15C17 15.83 16.33 16.5 15.5 16.5H13V12Z" fill="white" />
    </svg>
    <h1 style="font-size:4rem; font-weight:800; color:var(--text-primary); letter-spacing:-0.04em; margin-bottom:4px;">404</h1>
    <p style="font-size:1.1rem; color:var(--text-secondary); margin-bottom:2px;">Page not found</p>
    <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:32px;">The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" style="display:inline-block; padding:10px 24px; background:var(--brand); color:#fff; border-radius:var(--radius); font-size:0.9rem; font-weight:600; text-decoration:none; transition:background var(--transition);">Back to Home</a>
  </div>
</body>
</html>
