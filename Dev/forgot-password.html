<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — Parax</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="24" height="24" rx="6" fill="#5865f2" />
        <path d="M7 8.5C7 7.67 7.67 7 8.5 7H11V12H7V8.5ZM13 7H15.5C16.33 7 17 7.67 17 8.5V12H13V7ZM7 12H11V16.5C7.67 16.5 7 15.83 7 15 V12ZM13 12H17V15C17 15.83 16.33 16.5 15.5 16.5H13V12Z" fill="white" />
      </svg>
      Parax
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card" id="forgot-password-card">
      <h1>Forgot your password?</h1>
      <p class="subtitle">Enter your email or username to receive instructions.</p>

      <form id="forgot-password-form">
        <div class="form-group">
          <label for="identifier">Email or Username <span class="required">*</span></label>
          <input type="text" id="identifier" name="identifier" placeholder="you@example.com or username" required />
          <div class="error-message" id="error-message"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-full">Send</button>
      </form>

      <p class="switch-text" style="margin-top: 16px; text-align: center;">
        <a href="login.html">Back to login</a>
      </p>
    </div>

    <div class="auth-card hidden" id="sent-card">
      <h1>Check your inbox!</h1>
      <p class="subtitle">We've sent password reset instructions to your email.</p>
      <button type="button" class="btn btn-primary btn-full" onclick="window.location.href='login.html'">Back to login</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
  <script>
    const form = document.getElementById('forgot-password-form');
    const formCard = document.getElementById('forgot-password-card');
    const sentCard = document.getElementById('sent-card');
    const errorMessage = document.getElementById('error-message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const identifier = document.getElementById('identifier').value.trim();
      
      if (!identifier) {
        errorMessage.textContent = 'Please enter your email or username.';
        errorMessage.classList.add('visible');
        return;
      }
      
      try {
        errorMessage.classList.remove('visible');
        await window.sifremiUnuttum(identifier);
        formCard.classList.add('hidden');
        sentCard.classList.remove('hidden');
      } catch (err) {
        errorMessage.textContent = err.message || 'An error occurred.';
        errorMessage.classList.add('visible');
      }
    });
  </script>
</body>
</html>
