<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Parax</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="24" height="24" rx="6" fill="#5865f2" />
        <path d="M7 8.5C7 7.67 7.67 7 8.5 7H11V12H7V8.5ZM13 7H15.5C16.33 7 17 7.67 17 8.5V12H13V7ZM7 12H11V16.5C7.67 16.5 7 15.83 7 15 V12ZM13 12H17V15C17 15.83 16.33 16.5 15.5 16.5H13V12Z" fill="white" />
      </svg>
      Parax
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card" id="reset-password-card">
      <h1>Set a New Password</h1>
      <p class="subtitle">Enter your new secure password below.</p>

      <form id="reset-password-form">
        <div class="form-group">
          <label for="new-password">New Password <span class="required">*</span></label>
          <div class="password-wrapper">
            <input type="password" id="new-password" name="new-password" placeholder="Enter new password" required />
            <button type="button" class="password-toggle">Show</button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm New Password <span class="required">*</span></label>
          <div class="password-wrapper">
            <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm new password" required />
            <button type="button" class="password-toggle">Show</button>
          </div>
        </div>

        <div class="error-message" id="error-message"></div>

        <button type="submit" class="btn btn-primary btn-full">Reset Password</button>
      </form>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
  <script>
    // Password toggle functionality
    document.querySelectorAll('.password-toggle').forEach(button => {
      button.addEventListener('click', () => {
        const input = button.parentElement.querySelector('input');
        if (input.type === 'password') {
          input.type = 'text';
          button.textContent = 'Hide';
        } else {
          input.type = 'password';
          button.textContent = 'Show';
        }
      });
    });

    const form = document.getElementById('reset-password-form');
    const errorMessage = document.getElementById('error-message');
    
    // URL'den oobCode'u al
    const urlParams = new URLSearchParams(window.location.search);
    const oobCode = urlParams.get('oobCode');

    if (!oobCode) {
        errorMessage.textContent = 'Invalid or missing password reset link.';
        errorMessage.classList.add('visible');
        form.querySelector('button').disabled = true;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      
      if (newPassword !== confirmPassword) {
        errorMessage.textContent = 'Passwords do not match.';
        errorMessage.classList.add('visible');
        return;
      }
      
      if (newPassword.length < 8) {
        errorMessage.textContent = 'Password must be at least 8 characters.';
        errorMessage.classList.add('visible');
        return;
      }
      
      try {
        // Firebase ile şifreyi sıfırla
        await firebase.auth().confirmPasswordReset(oobCode, newPassword);
        
        errorMessage.textContent = 'Password reset successful! Redirecting to login...';
        errorMessage.style.color = 'var(--success)';
        errorMessage.classList.add('visible');
        
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);
      } catch (err) {
        errorMessage.textContent = err.message || 'An error occurred during reset.';
        errorMessage.classList.add('visible');
      }
    });
  </script>
</body>
</html>
